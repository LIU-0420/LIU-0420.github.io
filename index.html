<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我们的 520 记录</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <section class="login-screen" id="loginScreen">
      <form class="login-card" id="loginForm">
        <p class="eyebrow">Private Space</p>
        <h1 id="loginTitle">选择身份登录</h1>
        <p id="loginHint">管理员可发布照片和删除留言，游客只能发表评论。</p>
        <div class="login-tabs" aria-label="登录身份">
          <button class="active" type="button" data-login-role="admin">管理员</button>
          <button type="button" data-login-role="guest">游客</button>
        </div>
        <label id="accountField">
          <span>账号</span>
          <input id="accountInput" type="text" placeholder="请输入管理员账号" />
        </label>
        <label id="passwordField">
          <span>访问密码</span>
          <input id="passwordInput" type="password" placeholder="请输入管理员密码" />
        </label>
        <label id="visitorField">
          <span>游客昵称</span>
          <input id="visitorNameInput" type="text" placeholder="写一个你的昵称" maxlength="18" />
        </label>
        <button class="primary-button" id="loginButton" type="submit">进入</button>
        <p class="login-status" id="loginStatus"></p>
      </form>
    </section>

    <div class="app">
      <header class="hero">
        <nav class="nav">
          <strong id="brandTitle">我们的 520</strong>
          <div class="nav-actions">
            <button class="ghost-button" id="exportButton" type="button" data-admin-only>导出</button>
            <button class="ghost-button" id="logoutButton" type="button">退出</button>
            <button class="ghost-button danger" id="clearButton" type="button" data-admin-only>清空留言</button>
          </div>
        </nav>

        <section class="hero-grid">
          <div class="hero-copy">
            <p class="eyebrow">Love Timeline</p>
            <h1 id="heroTitle">把喜欢的日子认真存起来</h1>
            <p class="hero-text">
              记录照片、留言、纪念日和那些没来得及说出口的小事。
            </p>
            <div class="hero-actions">
              <a href="#photoForm" class="primary-button" data-admin-only>添加照片</a>
              <a href="#messageForm" class="secondary-button">写留言</a>
            </div>
          </div>

          <div class="memory-frame" aria-label="照片预览">
            <img
              id="coverImage"
              src="https://images.unsplash.com/photo-1518199266791-5375a83190b7?auto=format&fit=crop&w=900&q=80"
              alt="情侣牵手的暖色照片"
            />
            <label class="cover-upload" data-admin-only>
              <span>更换封面</span>
              <input id="coverInput" type="file" accept="image/*" />
            </label>
            <div class="frame-caption">
              <span>今天也要好好相爱</span>
              <strong id="coverDate"></strong>
            </div>
          </div>
        </section>
      </header>

      <main>
        <section class="stats" aria-label="纪念日信息">
          <article>
            <span>已经在一起</span>
            <strong id="daysTogether">0 天</strong>
          </article>
          <article>
            <span>下一次纪念日</span>
            <strong id="nextAnniversary">未设置</strong>
          </article>
          <article>
            <span>已记录</span>
            <strong id="recordCount">0 条</strong>
          </article>
        </section>

        <section class="settings" data-admin-only>
          <div>
            <p class="eyebrow">Anniversary</p>
            <h2>设置你们的重要日期</h2>
          </div>
          <form id="settingsForm" class="settings-form">
            <label>
              <span>在一起的日期</span>
              <input id="startDateInput" type="date" />
            </label>
            <label>
              <span>下一次纪念日</span>
              <input id="anniversaryInput" type="date" />
            </label>
            <button class="primary-button" type="submit">保存</button>
          </form>
        </section>

        <section class="composer-grid">
          <form class="composer" id="photoForm" data-admin-only>
            <div class="section-head">
              <p class="eyebrow">Photo</p>
              <h2>添加一张照片</h2>
            </div>
            <label>
              <span>照片</span>
              <input id="photoInput" type="file" accept="image/*" required />
            </label>
            <label>
              <span>标题</span>
              <input id="photoTitleInput" type="text" placeholder="比如：第一次一起看海" maxlength="28" required />
            </label>
            <label>
              <span>日期</span>
              <input id="photoDateInput" type="date" required />
            </label>
            <label>
              <span>一句话</span>
              <textarea id="photoNoteInput" placeholder="写下这一刻的感觉" maxlength="120"></textarea>
            </label>
            <button class="primary-button" type="submit">保存照片</button>
          </form>

          <form class="composer" id="messageForm">
            <div class="section-head">
              <p class="eyebrow">Message</p>
              <h2>写一条留言</h2>
            </div>
            <label>
              <span>留言</span>
              <textarea id="messageInput" placeholder="今天想对 TA 说什么？" maxlength="180" required></textarea>
            </label>
            <label>
              <span>照片（可选）</span>
              <input id="messagePhotoInput" type="file" accept="image/*" />
            </label>
            <label>
              <span>心情</span>
              <select id="moodInput">
                <option value="想念">想念</option>
                <option value="开心">开心</option>
                <option value="感谢">感谢</option>
                <option value="约定">约定</option>
              </select>
            </label>
            <button class="primary-button" type="submit">保存留言</button>
            <button class="secondary-button" id="quoteButton" type="button">换一句情话</button>
            <p class="quote" id="quoteText"></p>
          </form>
        </section>

        <section class="timeline-section message-section" id="messageSection">
          <div class="section-head">
            <p class="eyebrow">Messages</p>
            <h2>留言区</h2>
          </div>
          <div class="timeline message-wall" id="messageWall"></div>
          <p class="empty" id="messageEmptyState">还没有留言。先写一句想说的话吧。</p>
        </section>

        <section class="timeline-section" id="photoTimelineSection">
          <div class="section-head">
            <p class="eyebrow">Timeline</p>
            <h2>照片时间线</h2>
          </div>
          <div class="timeline" id="timeline"></div>
          <p class="empty" id="emptyState">还没有照片。管理员可以先添加一张照片。</p>
        </section>
      </main>
    </div>

    <section class="edit-modal hidden" id="editModal" aria-hidden="true">
      <form class="edit-card" id="editForm">
        <div class="section-head">
          <p class="eyebrow">Edit</p>
          <h2 id="editTitle">修改记录</h2>
        </div>
        <label id="editPhotoField">
          <span>照片（可选）</span>
          <input id="editPhotoInput" type="file" accept="image/*" />
        </label>
        <label>
          <span id="editRecordTitleLabel">标题</span>
          <input id="editRecordTitleInput" type="text" maxlength="28" required />
        </label>
        <label>
          <span>日期</span>
          <input id="editDateInput" type="date" required />
        </label>
        <label>
          <span id="editNoteLabel">一句话</span>
          <textarea id="editNoteInput" maxlength="180"></textarea>
        </label>
        <div class="edit-actions">
          <button class="secondary-button" id="cancelEditButton" type="button">取消</button>
          <button class="primary-button" type="submit">保存修改</button>
        </div>
      </form>
    </section>

    <template id="recordTemplate">
      <article class="record-card">
        <div class="record-media"></div>
        <div class="record-body">
          <div class="record-meta">
            <span class="record-type"></span>
            <time></time>
          </div>
          <h3></h3>
          <p></p>
          <div class="record-actions">
            <button class="edit-button" type="button" title="修改" aria-label="修改">✎</button>
            <button class="delete-button" type="button">删除</button>
          </div>
        </div>
      </article>
    </template>

    <script src="./app.js"></script>
  </body>
</html>
